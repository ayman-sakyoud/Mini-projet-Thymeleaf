<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Annuaire - AssetManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div th:replace="~{fragments/navbar :: sidebar(currentPage='employes')}"></div>
    <div th:replace="~{fragments/navbar :: header(pageTitle='Annuaire du Personnel')}"></div>

    <div id="content">
        <!-- Actions -->
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <p class="text-secondary m-0">Gestion des collaborateurs et accès services</p>
            </div>
            <a th:href="@{/employes/add}" class="btn btn-primary shadow-sm">
                <i class="fas fa-user-plus me-2"></i>Nouvel Employé
            </a>
        </div>

        <!-- Employees Grid -->
        <div class="employee-grid">
            <div th:each="e : ${employes}" class="profile-card shadow-sm border-0">
                <div class="avatar-container">
                    <div class="profile-avatar" th:text="${e.nom != null and #strings.contains(e.nom, ' ') ? #strings.substring(e.nom, 0, 1) + #strings.substring(e.nom, #strings.indexOf(e.nom, ' ') + 1, #strings.indexOf(e.nom, ' ') + 2) : (e.nom != null ? #strings.substring(e.nom, 0, 1) : 'U')}">JD</div>
                    <div class="status-dot online"></div> <!-- Simplified: always online for demo -->
                </div>
                
                <h3 class="profile-name" th:text="${e.nom}">Jean Dupont</h3>
                
                <div class="profile-service">
                    <span class="badge-pill badge-primary-custom" th:text="${e.service}">Service Informatique</span>
                </div>
                
                <p class="profile-email">
                    <i class="far fa-envelope me-1"></i> <span th:text="${e.email}">jean.dupont@company.com</span>
                </p>
                
                <div class="profile-actions">
                    <a th:href="@{/employes/edit/{id}(id=${e.id})}" class="btn btn-sm btn-outline-primary flex-grow-1">
                        <i class="fas fa-user-edit me-1"></i> Modifier
                    </a>
                    <a th:href="@{/employes/delete/{id}(id=${e.id})}" class="btn btn-sm btn-outline-secondary" onclick="return confirm('Supprimer ce profil employé ?')">
                        <i class="fas fa-trash-alt text-danger"></i>
                    </a>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${employes.isEmpty()}" class="col-12 text-center py-5">
                <div class="card p-5 border-0 shadow-sm bg-white">
                    <i class="fas fa-users-slash fa-4x mb-3 text-light"></i>
                    <h4 class="text-secondary">Aucun employé enregistré</h4>
                    <p class="text-muted">Commencez par ajouter des collaborateurs à votre annuaire.</p>
                    <div class="mt-3">
                        <a th:href="@{/employes/add}" class="btn btn-primary">Ajouter un employé</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
