<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier un Employé - AssetManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div th:replace="~{fragments/navbar :: sidebar(currentPage='employes')}"></div>
    <div th:replace="~{fragments/navbar :: header(pageTitle='Modifier un Collaborateur')}"></div>

    <div id="content">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm p-4">
                    <div class="mb-4">
                        <h4 class="fw-bold mb-1">Modifier l'employé</h4>
                        <p class="text-secondary small">Mettez à jour les informations du profil collaborateur</p>
                    </div>
                    
                    <form th:action="@{/employes/edit}" th:object="${employe}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="mb-3">
                            <label for="nom" class="form-label">Nom Complet</label>
                            <input type="text" th:field="*{nom}" class="form-control" id="nom" placeholder="ex: Jean Dupont" required>
                        </div>
                        <div class="mb-3">
                            <label for="service" class="form-label">Département / Service</label>
                            <input type="text" th:field="*{service}" class="form-control" id="service" placeholder="ex: IT, Marketing, RH..." required>
                        </div>
                        <div class="mb-4">
                            <label for="email" class="form-label">Adresse Email Professionnelle</label>
                            <input type="email" th:field="*{email}" class="form-control" id="email" placeholder="ex: j.dupont@entreprise.com" required>
                        </div>
                        
                        <div class="d-flex gap-3 pt-3 border-top">
                            <button type="submit" class="btn btn-primary flex-grow-1">
                                <i class="fas fa-save me-2"></i>Enregistrer les modifications
                            </button>
                            <a th:href="@{/employes}" class="btn btn-outline-secondary px-4">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
