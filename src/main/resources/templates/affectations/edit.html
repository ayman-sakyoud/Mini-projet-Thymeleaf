<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifier l'Affectation - ParcInformatique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column h-100">

    <div th:replace="~{fragments/navbar :: sidebar(currentPage='affectations')}"></div>

    <div id="content">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm p-4">
                    <div class="mb-4">
                        <h4 class="fw-bold mb-1">Modifier l'affectation</h4>
                        <p class="text-secondary small">Mettez à jour les détails de l'affectation</p>
                    </div>
                    
                    <form th:action="@{/affectations/edit}" th:object="${affectation}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="mb-3">
                            <label for="employe" class="form-label">Employé</label>
                            <select th:field="*{employe.id}" class="form-select" id="employe" required>
                                <option th:each="emp : ${employes}" th:value="${emp.id}" th:text="${emp.nom + ' (' + emp.service + ')'}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="materiel" class="form-label">Matériel</label>
                            <select th:field="*{materiel.id}" class="form-select" id="materiel" required>
                                <option th:each="mat : ${materiels}" th:value="${mat.id}" th:text="${mat.ref + ' - ' + mat.marque + ' (' + mat.type + ')'}"></option>
                            </select>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="dateDebut" class="form-label">Date début</label>
                                <input type="date" th:field="*{dateDebut}" class="form-control" id="dateDebut" required>
                            </div>
                            <div class="col-md-6">
                                <label for="dateFin" class="form-label">Date fin</label>
                                <input type="date" th:field="*{dateFin}" class="form-control" id="dateFin">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="statut" class="form-label">Statut</label>
                            <select th:field="*{statut}" class="form-select" id="statut" required>
                                <option th:each="s : ${statuts}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>
                        
                        <div class="d-flex gap-3 pt-3 border-top">
                            <button type="submit" class="btn btn-primary flex-grow-1">Mettre à jour</button>
                            <a th:href="@{/affectations}" class="btn btn-outline-secondary px-4">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
