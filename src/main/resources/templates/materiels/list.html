<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventaire - AssetManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div th:replace="~{fragments/navbar :: sidebar(currentPage='materiels')}"></div>
    <div th:replace="~{fragments/navbar :: header(pageTitle='Gestion de l\'Inventaire')}"></div>

    <div id="content">
        <!-- Actions & Filters -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <form th:action="@{/materiels}" method="get" class="d-flex gap-3 flex-grow-1 me-4">
                <div class="position-relative flex-grow-1" style="max-width: 400px;">
                    <i class="fas fa-search position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary"></i>
                    <input type="text" name="type" class="form-control ps-5 border-0 shadow-sm" th:value="${selectedType}" placeholder="Rechercher par type (ex: PC, Serveur...)">
                </div>
                <select name="etat" class="form-select border-0 shadow-sm" style="width: 200px;">
                    <option value="">Tous les états</option>
                    <option th:each="e : ${etats}" th:value="${e}" th:text="${e}" th:selected="${e == selectedEtat}"></option>
                </select>
                <button type="submit" class="btn btn-dark shadow-sm">
                    <i class="fas fa-filter me-2"></i>Filtrer
                </button>
                <a th:href="@{/materiels}" class="btn btn-outline-secondary shadow-sm" th:if="${selectedType != null || selectedEtat != null}">
                    Effacer
                </a>
            </form>
            <a th:href="@{/materiels/add}" class="btn btn-primary shadow-sm">
                <i class="fas fa-plus me-2"></i>Nouveau Matériel
            </a>
        </div>

        <!-- Inventory Table -->
        <div class="table-container shadow-sm">
            <table class="table">
                <thead>
                    <tr>
                        <th>Référence</th>
                        <th>Catégorie / Marque</th>
                        <th>Constructeur</th>
                        <th>État Actuel</th>
                        <th>Date d'Achat</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${materiels}">
                        <td>
                            <code class="fw-bold text-primary" th:text="${m.ref}">REF001</code>
                        </td>
                        <td>
                            <div class="fw-bold" th:text="${m.type}">PC Portatif</div>
                        </td>
                        <td>
                            <div class="text-secondary" th:text="${m.marque}">Dell Technologies</div>
                        </td>
                        <td>
                            <span th:if="${m.etat.name() == 'OK'}" class="badge-pill badge-success-custom">
                                <i class="fas fa-check-circle me-1"></i> Opérationnel
                            </span>
                            <span th:if="${m.etat.name() == 'EN_PANNE'}" class="badge-pill badge-danger-custom">
                                <i class="fas fa-times-circle me-1"></i> En Panne
                            </span>
                            <span th:if="${m.etat.name() == 'EN_MAINTENANCE'}" class="badge-pill badge-warning-custom">
                                <i class="fas fa-tools me-1"></i> Maintenance
                            </span>
                        </td>
                        <td>
                            <div class="text-secondary" th:text="${#temporals.format(m.dateAchat, 'dd MMM yyyy') ?: m.dateAchat}">01 Jan 2023</div>
                        </td>
                        <td class="text-end">
                            <div class="btn-group">
                                <a th:href="@{/materiels/edit/{id}(id=${m.id})}" class="btn btn-sm btn-outline-primary me-2">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <a th:href="@{/materiels/delete/{id}(id=${m.id})}" class="btn btn-sm btn-outline-secondary" onclick="return confirm('Confirmer la suppression de cet actif ?')">
                                    <i class="fas fa-trash-alt text-danger"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${materiels.isEmpty()}">
                        <td colspan="6" class="text-center py-5">
                            <div class="text-secondary mb-3">
                                <i class="fas fa-box-open fa-3x mb-3 opacity-25"></i>
                                <p>Aucun matériel ne correspond à votre recherche.</p>
                            </div>
                            <a th:href="@{/materiels/add}" class="btn btn-sm btn-primary">Ajouter le premier matériel</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
