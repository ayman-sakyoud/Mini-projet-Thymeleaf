<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nouvelle Affectation - AssetManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div th:replace="~{fragments/navbar :: sidebar(currentPage='affectations')}"></div>
    <div th:replace="~{fragments/navbar :: header(pageTitle='Nouvelle Affectation')}"></div>

    <div id="content">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm p-4">
                    <div class="mb-4">
                        <h4 class="fw-bold mb-1">Créer une affectation</h4>
                        <p class="text-secondary small">Attribuez un équipement à un collaborateur</p>
                    </div>
                    
                    <form th:action="@{/affectations/add}" th:object="${affectation}" method="post">
                        <div class="mb-3">
                            <label for="employe" class="form-label">Collaborateur</label>
                            <select th:field="*{employe.id}" class="form-select" id="employe" required>
                                <option value="">Sélectionnez un employé...</option>
                                <option th:each="emp : ${employes}" th:value="${emp.id}" th:text="${emp.nom + ' (' + emp.service + ')'}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="materiel" class="form-label">Équipement disponible</label>
                            <select th:field="*{materiel.id}" class="form-select" id="materiel" required>
                                <option value="">Sélectionnez un matériel...</option>
                                <option th:each="mat : ${materiels}" th:value="${mat.id}" th:text="${mat.ref + ' - ' + mat.marque + ' (' + mat.type + ')'}"></option>
                            </select>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="dateDebut" class="form-label">Date de début</label>
                                <input type="date" th:field="*{dateDebut}" class="form-control" id="dateDebut" required>
                            </div>
                            <div class="col-md-6">
                                <label for="dateFin" class="form-label">Date de fin (optionnel)</label>
                                <input type="date" th:field="*{dateFin}" class="form-control" id="dateFin">
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="statut" class="form-label">Statut de l'affectation</label>
                            <select th:field="*{statut}" class="form-select" id="statut" required>
                                <option th:each="s : ${statuts}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>
                        
                        <div class="d-flex gap-3 pt-3 border-top">
                            <button type="submit" class="btn btn-primary flex-grow-1">
                                <i class="fas fa-link me-2"></i>Confirmer l'affectation
                            </button>
                            <a th:href="@{/affectations}" class="btn btn-outline-secondary px-4">Annuler</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
